version: 0.2

env:
  variables:
    TS_TERRAFORM_BIN: "terraform"
    TS_VERSION_CHECK: "0"

phases:
  install:
    runtime-versions:
      python: $PYTHON_VERSION
      ruby: $RUBY_VERSION
    commands:
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/credentials.sh"
      - "dnf install -y yum-utils"
      - "pip install python-dotenv"
      - ". ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/terraform_installation.sh"
  build:
    commands:
      - "cd ${CODEBUILD_SRC_DIR}"
      - "echo ## TERRASPACE UP : Bringing up the infrastructure"
      - 'if [ "$TS_ENV" = "test" ]; then python3 ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/py/disassociate_waf.py; fi'
      - "bash ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/restore_plan_artifacts.sh"
      - 'make terraspace-up-plan stack="crm" plan="crm.plan"'
      - 'make terraspace-output-file stack="crm" out=".terraform.env"'
      - "cd terraform"
      - "python3 ${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/py/distribution_deploy.py"
      - "echo Triggering CI-CD Crm Pipeline"
      - "aws codepipeline start-pipeline-execution --name $CI_CD_CRM_PIPELINE_NAME || { echo 'Error starting CodePipeline'; exit 1; }"
    finally:
      - "mkdir -p ${CODEBUILD_SRC_DIR}/codepipeline-artifacts"
      - "printf 'up complete\n' > ${CODEBUILD_SRC_DIR}/codepipeline-artifacts/up.txt"

artifacts:
  files:
    - "codepipeline-artifacts/up.txt"
cache:
  paths:
    - "/bin"
    - "/usr/local/bin"
    - "/root/.terraform"
    - "/root/.cache"
    - "/root/.gem"
    - "/usr/local/bundle"
