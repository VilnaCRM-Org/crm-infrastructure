version: 0.2

env:
  variables:
    HURL_VERSION: "6.0.0"
    HURL_DIR: "./hurl"
    HURL_FILE: "sandbox_healthcheck.hurl"
    LIBCLANG_PATH: "/usr/lib64"
    SCRIPT_DIR: "./aws/scripts"

phases:
  install:
    commands:
      - echo 'Installing GitHub CLI (gh)...'
      - curl -fsSL https://cli.github.com/packages/rpm/gh-cli.repo | sudo tee /etc/yum.repos.d/gh-cli.repo
      - sudo yum install -y gh
      - gh --version
      - echo 'Installing dependencies for Hurl...'
      - yum groupinstall -y "Development Tools"
      - yum install -y pkgconfig gcc openssl-devel libxml2-devel clang llvm llvm-devel cmake jq
      - echo 'Installing Rust...'
      - curl https://sh.rustup.rs -sSf | sh -s -- -y
      - source $HOME/.cargo/env
      - rustc --version
      - cargo --version
      - echo 'Installing Hurl via cargo...'
      - cargo install hurl

  build:
    commands:
      - |
        if [ -z "${BRANCH_NAME}" ]; then
          echo "Error: Required environment variable BRANCH_NAME is not set or empty."
          exit 1
        fi

        if [ -z "${IS_PULL_REQUEST}" ]; then
          echo "Error: Required environment variable IS_PULL_REQUEST is not set or empty."
          exit 1
        fi
        if [ -z "${PROJECT_NAME}" ]; then
          echo "Error: Required environment variable PROJECT_NAME is not set or empty."
          exit 1
        fi

        if [ "${IS_PULL_REQUEST}" = "1" ]; then
          if [ -z "${PR_NUMBER}" ]; then
            echo "Error: Required environment variable PR_NUMBER is not set or empty."
            exit 1
          fi
          if [ -z "${GITHUB_REPOSITORY}" ]; then
            echo "Error: Required environment variable GITHUB_REPOSITORY is not set or empty."
            exit 1
          fi
        fi
      - ". ${CODEBUILD_SRC_DIR}/aws/scripts/sh/sanitize_branch.sh"
      - |
        echo "## Preparing Health Check for sandbox CRM website..."

        bucket_name="${PROJECT_NAME}-${BRANCH_NAME}"
        if [[ ${#bucket_name} -gt 63 ]]; then
          echo "Error: Total bucket name length exceeds 63 characters."
          exit 1
        fi

        WEBSITE_URL="http://${bucket_name}.s3-website.${AWS_DEFAULT_REGION}.amazonaws.com"

        echo "Website URL: $WEBSITE_URL"

        HURL_FILE_PATH="${CODEBUILD_SRC_DIR}/${HURL_DIR}/${HURL_FILE}"

        echo "## Running Health Check with Hurl..."
        if ! hurl --test --verbose \
          --variable website_url="$WEBSITE_URL" \
          "$HURL_FILE_PATH"; then
          echo "Health check failed for the website endpoint."

          if [ "${IS_PULL_REQUEST}" = "1" ]; then
            echo "Adding failure comment to PR..."
            if . "${CODEBUILD_SRC_DIR}/aws/scripts/sh/gh_auth_login.sh"; then
              COMMENT_BODY=":x: Health check failed for the sandbox CRM website.
              Please check the CodeBuild logs for detailed error information."

              if ! gh pr comment "$PR_NUMBER" -R "$GITHUB_REPOSITORY" --body "$COMMENT_BODY"; then
                echo "Failed to add error comment to PR, continuing with healthcheck failure."
              fi
            else
              echo "GitHub authentication failed - skipping failure comment."
            fi
          fi
          exit 1
        else
          if [ "${IS_PULL_REQUEST}" = "1" ]; then
            echo "Health check passed. Running create_pr_comment script..."
            comment_output=""
            comment_status=0
            if comment_output=$(bash "${CODEBUILD_SRC_DIR}/${SCRIPT_DIR}/sh/create_pr_comment.sh" 2>&1); then
               :
            else
               comment_status=$?
            fi

            printf '%s\n' "$comment_output"

            if [ "${comment_status}" -ne 0 ]; then
               echo "Warning: create_pr_comment.sh failed with exit code ${comment_status}; sandbox healthy, PR comment skipped."
            fi
          else
            echo "Health check passed. Skipping PR comment for non-PR execution."
          fi
        fi
