version: "3"

tasks:
  validate:
    desc: "Validate Terraform code for CI/CD CRM infrastructure stacks"
    env:
      TS_TERRAFORM_BIN: terraform
      TS_VERSION_CHECK: "0"
    cmds:
      - make terraspace-init stack=ci-cd-infrastructure-crm
      - make terraspace-validate stack=ci-cd-infrastructure-crm
      - make terraspace-init stack=ci-cd-iam
      - make terraspace-validate stack=ci-cd-iam
      - make terraspace-init stack=crm-iam
      - make terraspace-validate stack=crm-iam
      - make terraspace-init stack=iam-groups
      - make terraspace-validate stack=iam-groups
    silent: false

  format:
    desc: "Format Terraform code"
    cmds:
      - find ./terraform -path '*/.terraform/*' -prune -o -type f \( -name '*.tf' -o -name '*.tfvars' \) -print0 | xargs -0 -r terraform fmt -check -diff
    silent: false

  checkov:
    desc: "Run checkov"
    cmds:
      - checkov -o junitxml --framework terraform -d ./ --download-external-modules true > checkov.xml
    silent: false

  tfsec:
    desc: "Run tfsec"
    cmds:
      - tfsec ./ --format junit --out tfsec-junit.xml
    silent: false

  summary:
    desc: "Display summary"
    deps: [validate, format, checkov, tfsec]
    cmds:
      - echo "Validation and checks have been completed."
